[pytest]
pythonpath = .
testpaths = tests
python_files = test_*.py
addopts = --browser chromium --html=report.html --self-contained-html
markers =
    regression: regression test suite
    regresion: regression test suite in Spanish
    ui: user interface tests
    critical: critical path tests
    critico: critical path tests in Spanish
    funcional: functional tests
    navigation: navigation tests
    navegacion: navigation tests in Spanish
    hero: hero section tests
    branding: brand validation tests
    productos: product section tests
    submenu: submenu tests
    personas: personas segment tests
    empresas: empresas segment tests
    footer: footer tests
    legal: legal links tests
    compliance: compliance tests
    social: social links tests
    help: help center tests
    support: support tests
    ayuda: help center tests in Spanish
    categorias: category tests
    busqueda: search tests
    articulos: article tests
    conversion: conversion tests
    interaccion: interaction tests
    faq: frequently asked questions tests
    seguridad: security tests
    emergencia: emergency support tests
